<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Amor ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,0.2);
    width:90%;
    max-width:400px;
    color:white;
}

h1{
    margin-bottom:10px;
    font-size:24px;
}

.box{
    background: rgba(255,255,255,0.2);
    padding:10px;
    border-radius:12px;
    margin:10px 0;
    font-size:14px;
}

input{
    padding:10px;
    border:none;
    border-radius:10px;
    width:80%;
    margin-top:10px;
    text-align:center;
}

button{
    margin-top:10px;
    padding:8px 20px;
    border:none;
    border-radius:20px;
    background:white;
    color:#ff4d6d;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ffe3ec;
}

#conteudo{
    display:none;
}

#contador{
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div id="login">
    <h1>Digite nossa senha ❤️</h1>
    <input type="password" id="senha" placeholder="Digite aqui">
    <br>
    <button onclick="verificar()">Entrar</button>
</div>

<div id="conteudo">
    <h1>Desde 20/06/2024 ❤️</h1>

    <div class="box">
        Cada segundo ao seu lado é o melhor presente da minha vida.
    </div>

    <div class="box">
        Nosso amor só cresce a cada dia que passa.
    </div>

    <div id="contador"></div>
</div>

</div>

<script>
function verificar(){
    var senha = document.getElementById("senha").value;
    if(senha === "cayofelipe20"){
        document.getElementById("login").style.display="none";
        document.getElementById("conteudo").style.display="block";
        iniciarContador();
    }else{
        alert("Senha incorreta ❤️");
    }
}

function iniciarContador(){
    var dataInicio = new Date("June 20, 2024 00:00:00").getTime();

    setInterval(function(){
        var agora = new Date().getTime();
        var diferenca = agora - dataInicio;

        var dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
        var horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
        var minutos = Math.floor((diferenca / (1000 * 60)) % 60);
        var segundos = Math.floor((diferenca / 1000) % 60);

        document.getElementById("contador").innerHTML =
        dias + " dias, " +
        horas + " horas, " +
        minutos + " minutos e " +
        segundos + " segundos juntos ❤️";
    },1000);
}
</script>

</body>
</html>
