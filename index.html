<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nosso Amor ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#8B0000,#1e3c72);
color:white;
overflow-x:hidden;
text-align:center;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#login input{
padding:12px;
border-radius:20px;
border:none;
outline:none;
width:220px;
text-align:center;
}

#login button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:20px;
background:linear-gradient(45deg,#ff4b2b,#ff416c);
color:white;
cursor:pointer;
}

/* CONTEÚDO */
#conteudo{
display:none;
padding:30px 15px;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

h1{
margin-bottom:5px;
}

.data{
margin-bottom:10px;
font-weight:300;
}

#contador{
margin-bottom:30px;
font-size:15px;
}

/* BALÕES TEXTO */
.balao{
max-width:650px;
margin:20px auto;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.conteudo-texto{
max-height:110px;
overflow:hidden;
transition:max-height 0.8s cubic-bezier(0.65,0,0.35,1);
line-height:1.6;
font-size:15px;
}

.balao.expandido .conteudo-texto{
max-height:2000px;
}

.btn-ler{
margin-top:15px;
background:linear-gradient(45deg,#ff4b2b,#ff416c);
border:none;
padding:8px 18px;
border-radius:20px;
color:white;
cursor:pointer;
}

/* FOTOS */
.fotos{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:30px;
}

.foto-balao{
width:160px;
height:160px;
border-radius:20px;
background:rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
cursor:pointer;
}

.foto-balao input{
position:absolute;
width:100%;
height:100%;
opacity:0;
cursor:pointer;
}

.foto-balao img{
width:100%;
height:100%;
object-fit:cover;
}

/* MÚSICA */
.musica{
margin-top:30px;
}

.musica input{
padding:8px;
border-radius:15px;
border:none;
width:220px;
text-align:center;
}

.musica button{
padding:8px 15px;
border:none;
border-radius:15px;
background:#ff416c;
color:white;
cursor:pointer;
margin-left:5px;
}
</style>
</head>

<body>

<div id="login">
<h2>Digite nossa senha ❤️</h2>
<input type="password" id="senha" placeholder="Senha">
<button onclick="verificar()">Entrar</button>
</div>

<div id="conteudo">
<h1>Desde 05/09/2025 ❤️</h1>
<div class="data">O dia que começamos nossa história</div>
<div id="contador"></div>

<!-- TEXTO 1 -->
<div class="balao">
<div class="conteudo-texto">
COLE AQUI SEU TEXTO COMPLETO 1 EXATAMENTE COMO VOCÊ ESCREVEU.
</div>
<button class="btn-ler" onclick="toggleTexto(this)">Ler tudo ❤️</button>
</div>

<!-- TEXTO 2 -->
<div class="balao">
<div class="conteudo-texto">
COLE AQUI SEU TEXTO COMPLETO 2 EXATAMENTE COMO VOCÊ ESCREVEU.
</div>
<button class="btn-ler" onclick="toggleTexto(this)">Ler tudo ❤️</button>
</div>

<!-- FOTOS -->
<div class="fotos">
<div class="foto-balao">
<input type="file" accept="image/*" onchange="carregarFoto(event,this)">
<span>Adicionar</span>
</div>
<div class="foto-balao">
<input type="file" accept="image/*" onchange="carregarFoto(event,this)">
<span>Adicionar</span>
</div>
<div class="foto-balao">
<input type="file" accept="image/*" onchange="carregarFoto(event,this)">
<span>Adicionar</span>
</div>
<div class="foto-balao">
<input type="file" accept="image/*" onchange="carregarFoto(event,this)">
<span>Adicionar</span>
</div>
</div>

<!-- MÚSICA -->
<div class="musica">
<h3>Escolha a nossa música 🎵</h3>
<input type="text" id="linkMusica" placeholder="Cole o link .mp3 aqui">
<button onclick="carregarLink()">Adicionar</button>
<br><br>
<audio id="player"></audio>
</div>

</div>

<script>
let petalas=[];
let animando=false;

/* LOGIN */
function verificar(){
let senha=document.getElementById("senha").value;
if(senha==="cayofelipe20"){
document.getElementById("login").style.display="none";
document.getElementById("conteudo").style.display="block";
iniciarContador();
iniciarAnimacao();
tocarMusicaAutomatica();
}else{
alert("Senha incorreta ❤️");
}
}

/* CONTADOR */
function iniciarContador(){
let dataInicio=new Date("September 05, 2025 20:00:00").getTime();
setInterval(function(){
let agora=new Date().getTime();
let diff=agora-dataInicio;

let dias=Math.floor(diff/(1000*60*60*24));
let horas=Math.floor((diff/(1000*60*60))%24);
let minutos=Math.floor((diff/(1000*60))%60);
let segundos=Math.floor((diff/1000)%60);

document.getElementById("contador").innerHTML=
dias+" dias, "+horas+" horas, "+minutos+" minutos e "+segundos+" segundos juntos 🤍";
},1000);
}

/* LER TUDO */
function toggleTexto(botao){
const balao=botao.parentElement;
balao.classList.toggle("expandido");
botao.innerText=balao.classList.contains("expandido")?"Fechar 🤍":"Ler tudo ❤️";
}

/* FOTO */
function carregarFoto(event,input){
const file=event.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(e){
const container=input.parentElement;
container.innerHTML="";
const img=document.createElement("img");
img.src=e.target.result;
container.appendChild(img);
}
reader.readAsDataURL(file);
}

/* MÚSICA */
function carregarLink(){
let link=document.getElementById("linkMusica").value;
document.getElementById("player").src=link;
}

function tocarMusicaAutomatica(){
let player=document.getElementById("player");
if(player.src){
player.volume=0;
player.play().catch(()=>{});
let vol=0;
let fade=setInterval(()=>{
if(vol<1){
vol+=0.05;
player.volume=vol;
}else{
clearInterval(fade);
}
},200);
}
}

/* PÉTALAS FLUÍDAS */
function criarPetala(){
const el=document.createElement("div");
el.innerHTML="🌹";
el.style.position="fixed";
el.style.left=Math.random()*window.innerWidth+"px";
el.style.top="-30px";
el.style.fontSize="20px";
el.style.pointerEvents="none";
document.body.appendChild(el);

petalas.push({
el:el,
x:parseFloat(el.style.left),
y:-30,
vel:1+Math.random()*2,
rot:Math.random()*360,
rotVel:(Math.random()-0.5)*2
});
}

function iniciarAnimacao(){
if(animando)return;
animando=true;
setInterval(criarPetala,600);

function animar(){
petalas.forEach((p,i)=>{
p.y+=p.vel;
p.rot+=p.rotVel;
p.el.style.transform="translateY("+p.y+"px) rotate("+p.rot+"deg)";
if(p.y>window.innerHeight){
p.el.remove();
petalas.splice(i,1);
}
});
requestAnimationFrame(animar);
}
requestAnimationFrame(animar);
}
</script>

</body>
</html>
